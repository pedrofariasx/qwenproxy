services:
  qwenproxy:
    build: .
    container_name: qwenproxy
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      QWENPROXY_DATA_DIR: /app/data
      USER_DATA_DIR: /app/qwen_profiles/global
      QWENPROXY_PROFILES_DIR: /app/qwen_profiles
    volumes:
      - ./data:/app/data
      - ./qwen_profiles:/app/qwen_profiles
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
